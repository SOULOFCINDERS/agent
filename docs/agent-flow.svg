<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; }
      .title { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .text { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #374151; }
      .lane { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 2; rx: 16; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
      .arrowThin { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowHeadThin); }
    </style>

    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrowHeadThin" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="30" y="30" width="1140" height="800" class="lane"/>
  <text x="60" y="70" class="title">Agent 调用链路（CLI → Planner → Executor → Tools）</text>

  <rect x="70" y="110" width="1060" height="160" class="lane"/>
  <text x="90" y="145" class="title">CLI 层</text>

  <rect x="100" y="170" width="320" height="70" class="box"/>
  <text x="120" y="200" class="title">用户输入</text>
  <text x="120" y="225" class="text">agent run "&lt;task&gt;"</text>

  <rect x="460" y="170" width="640" height="70" class="box"/>
  <text x="480" y="200" class="title">cmd/agent/main.go</text>
  <text x="480" y="225" class="text">解析参数，注册工具，构建 Agent，调用 Agent.Run</text>

  <path d="M 420 205 L 460 205" class="arrow"/>

  <rect x="70" y="300" width="1060" height="210" class="lane"/>
  <text x="90" y="335" class="title">Agent / Planner 层</text>

  <rect x="100" y="365" width="420" height="90" class="box"/>
  <text x="120" y="395" class="title">Agent.Run</text>
  <text x="120" y="420" class="text">1) planner.Plan(task)</text>
  <text x="120" y="445" class="text">2) executor.Execute(plan)</text>

  <rect x="560" y="350" width="540" height="120" class="box"/>
  <text x="580" y="380" class="title">RulePlanner.Plan</text>
  <text x="580" y="405" class="text">splitIntoParts：按 then/然后/并且/; 拆分</text>
  <text x="580" y="430" class="text">planOne：每段映射为 StepToolCall（read/list/grep/summarize/...）</text>
  <text x="580" y="455" class="text">产出 Plan{Steps...}</text>

  <path d="M 520 410 L 560 410" class="arrow"/>
  <path d="M 780 245 L 320 365" class="arrowThin"/>

  <rect x="70" y="540" width="1060" height="270" class="lane"/>
  <text x="90" y="575" class="title">Executor / Tools 层</text>

  <rect x="100" y="610" width="520" height="150" class="box"/>
  <text x="120" y="640" class="title">Executor.Execute</text>
  <text x="120" y="665" class="text">遍历 Steps，逐步执行 ToolCall</text>
  <text x="120" y="690" class="text">自动注入：若 args 没有 input，则 input = 上一步输出</text>
  <text x="120" y="715" class="text">记录 TraceEvent（--trace 时逐行输出 JSON）</text>
  <text x="120" y="740" class="text">最终返回最后一步结果</text>

  <rect x="660" y="610" width="440" height="150" class="box"/>
  <text x="680" y="640" class="title">Tools（Registry 管理）</text>
  <text x="680" y="665" class="text">echo / calc / read_file</text>
  <text x="680" y="690" class="text">list_dir / grep_repo / summarize</text>
  <text x="680" y="715" class="text">每个工具：Name + Execute(ctx, args)</text>

  <path d="M 520 455 L 360 610" class="arrow"/>
  <path d="M 620 685 L 660 685" class="arrow"/>
  <path d="M 880 610 L 880 560" class="arrowThin"/>
  <text x="900" y="555" class="text">工具调用</text>
</svg>

